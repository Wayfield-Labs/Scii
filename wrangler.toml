name = "scii"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = false

[triggers]
crons = ["* * * * *"]

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "scii-status"

[vars]
MONITORS_URL = "https://raw.githubusercontent.com/wayfield-labs/scii-config/main/monitors.json"

[routes]
pattern = "status.wayfield.dev"
zone_name = "wayfield.dev"
